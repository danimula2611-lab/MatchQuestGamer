<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>MatchQuestGamer</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="dark" class="ion-padding">
  <div class="logo-container">
    <img src="assets/icon/logo.png" alt="Logo MatchQuestGamer" />
  </div>

  <div class="login-form">
    <ion-item fill="outline" color="light" class="ion-margin-bottom">
      <ion-label position="floating">Correo Electrónico</ion-label>
      <ion-input type="email" placeholder="ejemplo@gamer.com"></ion-input>
    </ion-item>

    <ion-item fill="outline" color="light" class="ion-margin-bottom">
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" placeholder="********"></ion-input>
    </ion-item>

    <ion-button expand="block" color="primary" class="btn-login ion-margin-top">
      INICIAR SESIÓN
    </ion-button>

    <p class="register-text">
      ¿No tienes cuenta? <a href="#">Regístrate aquí</a>
    </p>
  </div>
</ion-content>
