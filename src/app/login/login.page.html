<ion-header [translucent]="true">
  <ion-toolbar color="primary"> 
    <ion-title>MatchQuestGamer</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding"> 
  <div class="logo-container">
    <img src="assets/icon/logo.png" alt="Logo MatchQuestGamer" />
  </div>

  <div class="login-form">
    <ion-item fill="outline" class="ion-margin-bottom"> 
      <ion-label position="floating">Correo Electrónico</ion-label>
      <ion-input 
        type="email" 
        placeholder="ejemplo@gamer.com"
        [(ngModel)]="usuario.email"
        name="email">
      </ion-input>
    </ion-item>

    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input 
        type="password" 
        placeholder="********"
        [(ngModel)]="usuario.password"
        name="password">
      </ion-input>
    </ion-item>

    <ion-button expand="block" color="primary" class="btn-login ion-margin-top" (click)="onLogin()">
      INICIAR SESIÓN
    </ion-button>

    <p class="register-text">
      ¿No tienes cuenta? <a [routerLink]="['/register']" style="cursor: pointer;">Regístrate aquí</a>
    </p>
  </div>
</ion-content>
