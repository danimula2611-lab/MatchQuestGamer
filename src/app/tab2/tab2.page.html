<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>MatchQuestGamer</ion-title>

    <ion-buttons slot="end" class="ion-padding-horizontal">
      <div class="logo-header-container">
        <img src="assets/icon/logo.png" alt="Mini Logo MatchQuestGamer" />
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  
  <div class="ion-padding">
    <h2 style="font-weight: bold; color: #1c1c1e;">Chats activos</h2>
  </div>

  <div *ngIf="cargando">
    <ion-list lines="none" style="background: transparent; padding: 0 10px;">
      <ion-item *ngFor="let i of [1,2,3,4]" style="--background: #f4f5f8; border-bottom: 2px solid #e0e0e0; border-top-left-radius: 10px; border-top-right-radius: 10px; margin-bottom: 15px;">
        <ion-avatar slot="start">
          <ion-skeleton-text [animated]="true" style="width: 100%; height: 100%;"></ion-skeleton-text>
        </ion-avatar>
        <ion-label>
          <ion-skeleton-text [animated]="true" style="width: 40%; height: 16px; font-weight: bold;"></ion-skeleton-text>
          <ion-skeleton-text [animated]="true" style="width: 85%; height: 12px; margin-top: 8px;"></ion-skeleton-text>
        </ion-label>
        <ion-note slot="end">
          <ion-skeleton-text [animated]="true" style="width: 35px; height: 12px;"></ion-skeleton-text>
        </ion-note>
      </ion-item>
    </ion-list>
  </div>

  <div *ngIf="!cargando">
    <ion-list lines="none" style="background: transparent; padding: 0 10px;">
      
      <ion-item-sliding style="margin-bottom: 15px;">
        <ion-item [routerLink]="['/chat-detalle', 'AlexGamer_99']" detail="true" style="--background: #f4f5f8; border-bottom: 2px solid #000000; border-top-left-radius: 10px; border-top-right-radius: 10px; --border-radius: 0px;">
          <ion-avatar slot="start">
            <img src="https://i.pravatar.cc/150?u=alex" />
          </ion-avatar>
          <ion-label>
            <h3 style="font-weight: bold; color: #1c1c1e;">AlexGamer_99</h3>
            <p style="color: #666;">¡Perfecto! Nos falta uno para el grupo de Discord de esta tarde. ¿Le damos a las 18:00?</p>
          </ion-label>
          <ion-note slot="end" style="color: #666; font-weight: 500;">14:41</ion-note>
        </ion-item>
      </ion-item-sliding>

      <ion-item-sliding style="margin-bottom: 15px;">
        <ion-item [routerLink]="['/chat-detalle', 'Lucia_Hunter']" detail="true" style="--background: #f4f5f8; border-bottom: 2px solid #000000; border-top-left-radius: 10px; border-top-right-radius: 10px; --border-radius: 0px;">
          <ion-avatar slot="start">
            <img src="https://i.pravatar.cc/150?u=lucia" />
          </ion-avatar>
          <ion-label>
            <h3 style="font-weight: bold; color: #1c1c1e;">Lucia_Hunter</h3>
            <p style="color: #666;">Suelo ir Support o Mid, ¡estoy lista cuando quieras!</p>
          </ion-label>
          <ion-note slot="end" style="color: #666;">14:05</ion-note>
        </ion-item>
      </ion-item-sliding>

      <ion-item-sliding style="margin-bottom: 15px;">
        <ion-item [routerLink]="['/chat-detalle', 'Antonio_el_rey']" detail="true" style="--background: #f4f5f8; border-bottom: 2px solid #000000; border-top-left-radius: 10px; border-top-right-radius: 10px; --border-radius: 0px;">
          <ion-avatar slot="start">
            <img src="https://i.pravatar.cc/150?u=antonio" />
          </ion-avatar>
          <ion-label>
            <h3 style="font-weight: bold; color: #1c1c1e;">Antonio_el_rey</h3>
            <p style="color: #666;">Perfecto! Te espero en discord.</p>
          </ion-label>
          <ion-note slot="end" style="color: #666;">Ayer</ion-note>
        </ion-item>
      </ion-item-sliding>
      
    </ion-list>
  </div>

</ion-content>
