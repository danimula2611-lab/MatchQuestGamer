<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>MatchQuestGamer</ion-title>

    <ion-buttons slot="end" class="ion-padding-horizontal">
      <div class="logo-header-container">
        <img src="assets/icon/logo.png" alt="Mini Logo MatchQuestGamer" />
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <div class="ion-text-center ion-margin-top">
    <ion-avatar style="width: 120px; height: 120px; margin: 0 auto; border: 4px solid #0066ff; box-shadow: 0px 4px 10px rgba(0, 102, 255, 0.2);">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <h1 style="font-weight: bold; color: #1c1c1e;" class="ion-margin-top">DaniMu_8</h1>
  </div>

  <ion-grid class="ion-margin-top">
    <ion-row class="ion-text-center">
      <ion-col>
        <strong style="font-size: 20px; color: #000000;">492</strong>
        <p style="margin: 0; color: #666;">Matches</p>
      </ion-col>
      <ion-col>
        <strong style="font-size: 20px; color: #000000;">77</strong>
        <p style="margin: 0; color: #666;">Nivel</p>
      </ion-col>
      <ion-col>
        <strong style="font-size: 20px; color: #000000;">8</strong>
        <p style="margin: 0; color: #666;">Premios</p>
      </ion-col>
    </ion-row>
  </ion-grid>

  <div class="section-title ion-margin-top">
    <h2 style="font-weight: bold; color: #1c1c1e; margin-left: 10px;">Mis Juegos</h2>
  </div>

  <ion-list lines="none" style="background: transparent; padding: 0 10px;">
    
    <ion-item style="--background: #e0f7fa; border-left: 5px solid #00e5ff; border-bottom: 2px solid #000000; border-top-left-radius: 5px; border-top-right-radius: 10px; margin-bottom: 12px;">
      <ion-icon slot="start" name="shield-outline" style="color: #00838f; font-size: 24px;"></ion-icon>
      <ion-label>
        <h3 style="font-weight: bold; color: #1c1c1e;">VALORANT</h3>     
        <p style="color: #2c3e50; font-weight: 500;">Rango: Inmortal</p>
      </ion-label>
    </ion-item>

    <ion-item style="--background: #fce4ec; border-left: 5px solid #ff007f; border-bottom: 2px solid #000000; border-top-left-radius: 5px; border-top-right-radius: 10px; margin-bottom: 12px;">
      <ion-icon slot="start" name="shield-outline" style="color: #c2185b; font-size: 24px;"></ion-icon>
      <ion-label>
        <h3 style="font-weight: bold; color: #1c1c1e;">LEAGUE OF LEGENDS</h3>
        <p style="color: #2c3e50; font-weight: 500;">Rango: Oro IV</p>
      </ion-label>
    </ion-item>

    <ion-item style="--background: #fffde7; border-left: 5px solid #ffd600; border-bottom: 2px solid #000000; border-top-left-radius: 5px; border-top-right-radius: 10px; margin-bottom: 12px;">
      <ion-icon slot="start" name="game-controller-outline" style="color: #f57f17; font-size: 24px;"></ion-icon>
      <ion-label>
        <h3 style="font-weight: bold; color: #1c1c1e;">FC 26</h3>
        <p style="color: #2c3e50; font-weight: 500;">Clubes Pro: Division 2 | Rivals: Elite</p>
      </ion-label>
    </ion-item>

    <ion-item style="--background: #e8f5e9; border-left: 5px solid #4caf50; border-bottom: 2px solid #000000; border-top-left-radius: 5px; border-top-right-radius: 10px; margin-bottom: 12px;">
      <ion-icon slot="start" name="trophy-outline" style="color: #2e7d32; font-size: 24px;"></ion-icon>
      <ion-label>
        <h3 style="font-weight: bold; color: #1c1c1e;">CLASH ROYALE</h3>
        <p style="color: #2c3e50; font-weight: 500;">Copas: 10.930</p>
      </ion-label>
    </ion-item>

  </ion-list>

  <ion-button expand="block" color="danger" fill="solid" style="margin-top: 30px; font-weight: bold;">
    CERRAR SESIÓN
  </ion-button>

</ion-content>
