<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>Mi Perfil Gamer</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <div class="ion-text-center ion-margin-top">
    <ion-avatar style="width: 120px; height: 120px; margin: 0 auto; border: 3px solid var(--ion-color-primary);">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <h1 class="ion-margin-top">DaniMu_8</h1>
    <p style="color: #a1a1a1;">Buscando el mejor equipo de Valorant EUW</p>
  </div>

  <ion-grid class="ion-margin-top">
    <ion-row class="ion-text-center">
      <ion-col>
        <strong>492</strong>
        <p>Matches</p>
      </ion-col>
      <ion-col>
        <strong>77</strong>
        <p>Nivel</p>
      </ion-col>
      <ion-col>
        <strong>8</strong>
        <p>Premios</p>
      </ion-col>
    </ion-row>
  </ion-grid>

  <div class="section-title">
    <h2>Mis Juegos</h2>
  </div>

  <ion-list lines="full" class="ion-no-padding" style="background: transparent;">
    <ion-item color="dark">
      <ion-icon slot="start" name="trophy-outline" color="warning"></ion-icon>
      <ion-label>
        <h3>Valorant</h3>
        <p>Rango: Inmortal</p>
      </ion-label>
    </ion-item>

    <ion-item color="dark">
      <ion-icon slot="start" name="shield-outline" color="success"></ion-icon>
      <ion-label>
        <h3>League of Legends</h3>
        <p>Rango: Platino III</p>
      </ion-label>
    </ion-item>

    <ion-item color="dark">
      <ion-icon slot="start" name="game-controller-outline" color="primary"></ion-icon>
      <ion-label>
        <h3>FC 26</h3>
        <p>Clubes Pro: MED 88 / Division 2 <br>
          Division Rivals: Division Elite
        </p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="danger" fill="outline" class="ion-margin-top">
    Cerrar Sesión
  </ion-button>

</ion-content>
