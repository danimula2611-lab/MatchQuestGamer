<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>MatchQuestGamer</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="logo-container">
    <img src="assets/icon/logo.png" alt="Logo MatchQuestGamer" />
  </div>

  <div class="login-form">
    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="floating">Nombre de Usuario</ion-label>
      <ion-input type="text" placeholder="Tu nick gamer"></ion-input>
    </ion-item>

    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="floating">Correo Electrónico</ion-label>
      <ion-input type="email" placeholder="ejemplo@gamer.com"></ion-input>
    </ion-item>

    <ion-item fill="outline" class="ion-margin-bottom">
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" placeholder="********"></ion-input>
    </ion-item>

    <ion-button expand="block" color="primary" class="btn-login ion-margin-top" (click)="onRegister()">
      REGISTRARME
    </ion-button>

    <p class="register-text">
      ¿Ya tienes cuenta? <a (click)="goToLogin()" style="cursor: pointer;">Inicia sesión aquí</a>
    </p>
  </div>
</ion-content>
