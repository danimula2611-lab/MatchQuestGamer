<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab2" text="Atrás"></ion-back-button>
    </ion-buttons>

    <div style="display: flex; align-items: center; gap: 10px; padding-left: 5px;">
      <ion-avatar style="width: 34px; height: 34px;">
        <img [src]="fotoUsuario" alt="Foto de perfil" />
      </ion-avatar>
      <ion-title style="padding: 0; font-size: 18px; font-weight: bold;">
        {{ nombreUsuario }}
      </ion-title>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" style="--background: #f0f2f5;">

  <div class="chat-container">
    <div *ngFor="let msg of mensajes" 
         [class.mensaje-mio]="msg.esMio" 
         [class.mensaje-otro]="!msg.esMio" 
         class="burbuja-mensaje">
      <p class="texto-msg">{{ msg.texto }}</p>
      <span class="hora-msg">{{ msg.hora }}</span>
    </div>
  </div>

</ion-content>

<ion-footer style="border-top: 1px solid #e0e0e0;">
  <ion-toolbar style="--background: #ffffff; background: #ffffff;">
    <ion-item lines="none" style="--background: #ffffff; background: #ffffff; width: 100%;">
      <ion-input [(ngModel)]="nuevoMensaje" 
                 placeholder="Escribe un mensaje..." 
                 (keyup.enter)="enviarMensaje()"
                 style="color: #1c1c1e; --color: #1c1c1e; --placeholder-color: #8e8e93;">
      </ion-input>
      <ion-button slot="end" fill="clear" (click)="enviarMensaje()">
        <ion-icon name="send" slot="icon-only" color="primary"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-footer>
